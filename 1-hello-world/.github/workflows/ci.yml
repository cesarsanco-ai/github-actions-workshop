name: Hello World Action

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  hello-world:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Mostrar mensaje Hello World
        run: |
          echo "Hello World desde GitHub Actions"
          echo "Repositorio: ${{ github.repository }}"
          echo "Autor del evento: ${{ github.actor }}"
